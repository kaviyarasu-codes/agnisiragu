<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 760" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#9aa0a6"/>
    </marker>
  </defs>

  <rect width="1080" height="760" fill="#ffffff"/>

  <!-- Title -->
  <text x="540" y="44" text-anchor="middle" font-size="26" font-weight="700" fill="#1a1a1a">Agnisiragu News Platform</text>
  <text x="540" y="68" text-anchor="middle" font-size="14" fill="#6b7280">System Architecture Overview</text>
  <rect x="470" y="80" width="140" height="3" fill="#E94E2B"/>

  <!-- ===== CLIENT LAYER ===== -->
  <text x="60" y="120" font-size="13" font-weight="700" fill="#9aa0a6">CLIENT APPS</text>

  <g>
    <rect x="60" y="132" width="280" height="78" rx="10" fill="#fff4f1" stroke="#E94E2B" stroke-width="1.5"/>
    <text x="200" y="162" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a1a">Reader App</text>
    <text x="200" y="184" text-anchor="middle" font-size="12" fill="#6b7280">React Native + Expo</text>
    <text x="200" y="200" text-anchor="middle" font-size="11" fill="#9aa0a6">Public news reading</text>
  </g>
  <g>
    <rect x="400" y="132" width="280" height="78" rx="10" fill="#fff4f1" stroke="#E94E2B" stroke-width="1.5"/>
    <text x="540" y="162" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a1a">Reporter App</text>
    <text x="540" y="184" text-anchor="middle" font-size="12" fill="#6b7280">React Native + Expo</text>
    <text x="540" y="200" text-anchor="middle" font-size="11" fill="#9aa0a6">Citizen journalist uploads</text>
  </g>
  <g>
    <rect x="740" y="132" width="280" height="78" rx="10" fill="#fff4f1" stroke="#E94E2B" stroke-width="1.5"/>
    <text x="880" y="162" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a1a">Admin Panel</text>
    <text x="880" y="184" text-anchor="middle" font-size="12" fill="#6b7280">React.js (web)</text>
    <text x="880" y="200" text-anchor="middle" font-size="11" fill="#9aa0a6">Verification &amp; management</text>
  </g>

  <!-- arrows client -> gateway -->
  <line x1="200" y1="210" x2="200" y2="246" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="540" y1="210" x2="540" y2="246" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="880" y1="210" x2="880" y2="246" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== GATEWAY ===== -->
  <rect x="60" y="250" width="960" height="46" rx="8" fill="#f1f3f4" stroke="#d0d4d8" stroke-width="1"/>
  <text x="540" y="278" text-anchor="middle" font-size="13" font-weight="700" fill="#3c4043">Cloudflare CDN  ·  API Gateway  ·  HTTPS / Rate limiting / DDoS protection</text>

  <line x1="540" y1="296" x2="540" y2="330" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== BACKEND ===== -->
  <text x="60" y="324" font-size="13" font-weight="700" fill="#9aa0a6">BACKEND</text>
  <rect x="60" y="334" width="640" height="178" rx="10" fill="#eef2ff" stroke="#4f5bd5" stroke-width="1.5"/>
  <text x="380" y="362" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a1a">NestJS Backend API  ·  TypeScript</text>

  <!-- module chips -->
  <g font-size="11" fill="#3c4043">
    <rect x="80" y="378" width="120" height="30" rx="6" fill="#ffffff" stroke="#c5cae9"/><text x="140" y="397" text-anchor="middle">Auth (JWT + OTP)</text>
    <rect x="212" y="378" width="120" height="30" rx="6" fill="#ffffff" stroke="#c5cae9"/><text x="272" y="397" text-anchor="middle">News</text>
    <rect x="344" y="378" width="120" height="30" rx="6" fill="#ffffff" stroke="#c5cae9"/><text x="404" y="397" text-anchor="middle">Reporters</text>
    <rect x="476" y="378" width="120" height="30" rx="6" fill="#ffffff" stroke="#c5cae9"/><text x="536" y="397" text-anchor="middle">Rewards</text>

    <rect x="80" y="416" width="120" height="30" rx="6" fill="#ffffff" stroke="#c5cae9"/><text x="140" y="435" text-anchor="middle">Admin / Audit</text>
    <rect x="212" y="416" width="120" height="30" rx="6" fill="#ffffff" stroke="#c5cae9"/><text x="272" y="435" text-anchor="middle">Comments</text>
    <rect x="344" y="416" width="120" height="30" rx="6" fill="#ffffff" stroke="#c5cae9"/><text x="404" y="435" text-anchor="middle">Notifications</text>
    <rect x="476" y="416" width="120" height="30" rx="6" fill="#ffffff" stroke="#c5cae9"/><text x="536" y="435" text-anchor="middle">Media (S3)</text>
  </g>
  <rect x="80" y="458" width="600" height="38" rx="6" fill="#ffffff" stroke="#c5cae9"/>
  <text x="380" y="481" text-anchor="middle" font-size="11" fill="#6b7280">Socket.IO real-time publishing  ·  Redis job queues  ·  Role-based access control</text>

  <!-- AI services -->
  <text x="730" y="324" font-size="13" font-weight="700" fill="#9aa0a6">AI SERVICES</text>
  <rect x="730" y="334" width="290" height="178" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="875" y="362" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a1a">AI Pipeline</text>
  <g font-size="11" fill="#3c4043">
    <rect x="748" y="378" width="254" height="30" rx="6" fill="#ffffff" stroke="#a7f3d0"/><text x="875" y="397" text-anchor="middle">OpenAI Whisper — voice → Tamil text</text>
    <rect x="748" y="416" width="254" height="30" rx="6" fill="#ffffff" stroke="#a7f3d0"/><text x="875" y="435" text-anchor="middle">OpenAI Moderation — toxic / fake news</text>
    <rect x="748" y="454" width="254" height="42" rx="6" fill="#ffffff" stroke="#a7f3d0"/><text x="875" y="479" text-anchor="middle">Duplicate detection · Auto headline</text>
  </g>
  <line x1="700" y1="423" x2="744" y2="423" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="380" y1="512" x2="380" y2="546" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== DATA LAYER ===== -->
  <text x="60" y="540" font-size="13" font-weight="700" fill="#9aa0a6">DATA &amp; STORAGE</text>
  <g>
    <rect x="60" y="550" width="200" height="66" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
    <text x="160" y="580" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">PostgreSQL</text>
    <text x="160" y="600" text-anchor="middle" font-size="11" fill="#6b7280">Prisma ORM</text>
  </g>
  <g>
    <rect x="280" y="550" width="200" height="66" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
    <text x="380" y="580" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">Redis</text>
    <text x="380" y="600" text-anchor="middle" font-size="11" fill="#6b7280">Cache · Queues · Sessions</text>
  </g>
  <g>
    <rect x="500" y="550" width="200" height="66" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
    <text x="600" y="580" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">AWS S3</text>
    <text x="600" y="600" text-anchor="middle" font-size="11" fill="#6b7280">Photo · Video · Audio</text>
  </g>

  <!-- ===== EXTERNAL SERVICES ===== -->
  <text x="730" y="540" font-size="13" font-weight="700" fill="#9aa0a6">EXTERNAL SERVICES</text>
  <g font-size="11.5" fill="#3c4043">
    <rect x="730" y="550" width="138" height="30" rx="6" fill="#f8f9fa" stroke="#d0d4d8"/><text x="799" y="569" text-anchor="middle">MSG91 — OTP SMS</text>
    <rect x="882" y="550" width="138" height="30" rx="6" fill="#f8f9fa" stroke="#d0d4d8"/><text x="951" y="569" text-anchor="middle">Razorpay — payouts</text>
    <rect x="730" y="586" width="138" height="30" rx="6" fill="#f8f9fa" stroke="#d0d4d8"/><text x="799" y="605" text-anchor="middle">Firebase — push</text>
    <rect x="882" y="586" width="138" height="30" rx="6" fill="#f8f9fa" stroke="#d0d4d8"/><text x="951" y="605" text-anchor="middle">Google AdMob — ads</text>
  </g>

  <!-- ===== NEWS FLOW STRIP ===== -->
  <rect x="60" y="648" width="960" height="86" rx="10" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>
  <text x="80" y="674" font-size="12" font-weight="700" fill="#E94E2B">NEWS PUBLISHING FLOW</text>
  <g font-size="11" fill="#3c4043">
    <text x="92" y="704" font-size="11" fill="#3c4043">Reporter uploads</text>
    <text x="92" y="719" font-size="11" fill="#9aa0a6">photo/video + voice</text>
    <text x="270" y="711" font-size="11">AI voice → text</text>
    <text x="430" y="711" font-size="11">Admin verifies</text>
    <text x="590" y="711" font-size="11">Instant publish</text>
    <text x="740" y="711" font-size="11">Push notification</text>
    <text x="900" y="704" font-size="11">Live in Reader App</text>
    <text x="900" y="719" font-size="11" fill="#9aa0a6">Reporter earns points</text>
  </g>
  <g stroke="#E94E2B" stroke-width="1.5">
    <line x1="210" y1="707" x2="258" y2="707" marker-end="url(#arrow)"/>
    <line x1="360" y1="707" x2="418" y2="707" marker-end="url(#arrow)"/>
    <line x1="520" y1="707" x2="578" y2="707" marker-end="url(#arrow)"/>
    <line x1="675" y1="707" x2="728" y2="707" marker-end="url(#arrow)"/>
    <line x1="838" y1="707" x2="890" y2="707" marker-end="url(#arrow)"/>
  </g>
</svg>

# infra/nginx/conf.d/api.conf
# Replace api.agnisiragu.in with your actual API domain

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
server {
    listen 80;
    server_name api.agnisiragu.in;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS API Server ───────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.agnisiragu.in;

    # ── SSL ──────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.agnisiragu.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.agnisiragu.in/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/api.agnisiragu.in/chain.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;

    # ── Security headers ─────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none';" always;

    # Block bad bots
    if ($bad_bot) { return 403; }

    # Connection limit
    limit_conn conn_limit 20;

    # ── Health check (no rate limit) ─────────────────────────────────────
    location = /api/v1/health {
        proxy_pass http://nestjs_backend;
        proxy_http_version 1.1;
        access_log off;
    }

    # ── Auth endpoints — strict rate limit ───────────────────────────────
    location ~ ^/api/v1/auth/(send-otp|verify-otp|login) {
        limit_req zone=api_auth burst=3 nodelay;
        limit_req_status 429;

        proxy_pass         http://nestjs_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Upload endpoints — size + rate limit ─────────────────────────────
    location ~ ^/api/v1/media {
        limit_req zone=api_upload burst=5 nodelay;
        client_max_body_size 50m;

        proxy_pass         http://nestjs_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;   # uploads can be slow
        proxy_send_timeout 120s;
    }

    # ── All other API routes ──────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_general burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://nestjs_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;

        # Cache GET requests for public news endpoints
        proxy_cache_bypass $http_authorization;
    }

    # ── Block everything else ─────────────────────────────────────────────
    location / {
        return 404;
    }
}

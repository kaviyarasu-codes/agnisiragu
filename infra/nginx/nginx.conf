# infra/nginx/nginx.conf
# Production Nginx — Agnisiragu News Platform

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main buffer=16k flush=5s;

    # ── Performance ───────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;           # Hide Nginx version

    # ── Gzip compression ──────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml application/atom+xml image/svg+xml;

    # ── Buffer sizes ──────────────────────────────────────────────────────
    client_body_buffer_size    128k;
    client_max_body_size       50m;    # Allow media uploads
    client_header_buffer_size  1k;
    large_client_header_buffers 4 4k;
    output_buffers             1 32k;
    postpone_output            1460;

    # ── Timeouts ──────────────────────────────────────────────────────────
    client_body_timeout    12s;
    client_header_timeout  12s;
    send_timeout           10s;

    # ── Rate limiting zones ───────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_general:10m  rate=60r/m;
    limit_req_zone $binary_remote_addr zone=api_auth:10m     rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api_upload:10m   rate=10r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Security: block bad bots / scanners ───────────────────────────────
    map $http_user_agent $bad_bot {
        default 0;
        ~*masscan 1;
        ~*sqlmap  1;
        ~*nikto   1;
        ~*nmap    1;
        ~*zgrab   1;
    }

    # ── Upstream ──────────────────────────────────────────────────────────
    upstream nestjs_backend {
        server backend:3000;
        keepalive 32;
    }

    include /etc/nginx/conf.d/*.conf;
}

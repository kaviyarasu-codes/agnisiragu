# infra/docker-compose.yml
# Agnisiragu News Platform — Local Development Stack

services:
  postgres:
    image: postgres:16-alpine
    container_name: agnisiragu_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agnisiragu
      POSTGRES_USER: agnisiragu
      POSTGRES_PASSWORD: agnisiragu_dev_password
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U agnisiragu']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agnisiragu_redis
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

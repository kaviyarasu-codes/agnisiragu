# .github/workflows/deploy.yml
# CI/CD Pipeline — Agnisiragu News Platform
# Triggers on push to main branch

name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'agnisiragu/backend/**'
      - 'infra/**'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches: [main]
    paths:
      - 'agnisiragu/backend/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend

jobs:
  # ── 1. Test ───────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agnisiragu/backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: agnisiragu_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: agnisiragu/backend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations (test DB)
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/agnisiragu_test

      - name: Run unit tests
        run: npm test -- --passWithNoTests
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/agnisiragu_test
          JWT_SECRET: test-secret-for-ci
          JWT_REFRESH_SECRET: test-refresh-secret-for-ci

      - name: Run lint
        run: npm run lint || true

  # ── 2. Build & Push Docker image ─────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: agnisiragu/backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Deploy to production server ───────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://api.agnisiragu.in

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy infra files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "infra/"
          target: "/opt/agnisiragu/"
          strip_components: 0

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e

            cd /opt/agnisiragu

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Update IMAGE_TAG in .env
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${{ needs.build.outputs.image_tag }}/" .env
            sed -i "s/^GITHUB_REPOSITORY=.*/GITHUB_REPOSITORY=${{ github.repository }}/" .env

            # Pull new image
            docker compose -f infra/docker-compose.prod.yml pull backend

            # Zero-downtime rolling deploy
            docker compose -f infra/docker-compose.prod.yml up -d --no-deps --force-recreate backend

            # Wait for health check
            echo "Waiting for backend to be healthy..."
            for i in $(seq 1 30); do
              if docker inspect --format='{{.State.Health.Status}}' agnisiragu_backend | grep -q "healthy"; then
                echo "✅ Backend is healthy"
                break
              fi
              echo "Attempt $i/30..."
              sleep 5
            done

            # Clean up old images
            docker image prune -f

            echo "🚀 Deployment complete"

      - name: Notify on success
        if: success()
        run: |
          echo "✅ Deployed successfully to production"
          echo "Image tag: ${{ needs.build.outputs.image_tag }}"

      - name: Notify on failure
        if: failure()
        run: echo "❌ Deployment failed — check GitHub Actions logs"

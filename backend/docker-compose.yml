services:
  postgres:
    image: postgres:16-alpine
    container_name: agnisiragu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: agnisiragu
    ports:
      - '5434:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: agnisiragu-redis
    restart: unless-stopped
    ports:
      - '6381:6379'

volumes:
  postgres_data:
